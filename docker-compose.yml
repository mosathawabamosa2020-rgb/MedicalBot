version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg15
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=32MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - max_connections=200
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical
    ports:
      - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  adminer:
    image: adminer
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
volumes:
  db_data:
  redis_data:
